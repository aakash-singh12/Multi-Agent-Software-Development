version: '3.8'

services:
  advocate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: advocate-app
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      # You can optionally supply default keys here, or configure them dynamically in the UI
      # - ANTHROPIC_API_KEY=your_key
      # - OPENAI_API_KEY=your_key
      # - GEMINI_API_KEY=your_key
    volumes:
      # Mount the workspace directory to persist files generated by agents
      - ./workspace:/app/workspace
    restart: unless-stopped
